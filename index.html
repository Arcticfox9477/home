<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX | SNOW PORTAL</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            color: white; font-family: sans-serif;
        }

        /* 🖼️ 背景圖層：使用強大的絕對路徑 */
        .bg {
            position: fixed; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            background-image: url('https://raw.githubusercontent.com/Arcticfox9477/home/main/bg.jpg') !important;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            display: block !important;
        }

        /* 🌫️ 模糊遮罩層 */
        .blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .content { position: relative; z-index: 10; height: 100vh; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .container { width: 320px; text-align: center; pointer-events: auto; }

        /* 🖼️ 大頭貼設定：保持你喜歡的樣子 */
        .profile-pic { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            margin: 0 auto 15px; 
            border: 2px solid #fff; 
            /* 💡 這裡也統一使用絕對路徑，確保穩定性 */
            background-image: url('https://raw.githubusercontent.com/Arcticfox9477/home/main/28599.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        h1 { font-size: 2rem; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 2px 2px 5px #000; }

        /* 按鈕樣式 */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.06); 
            color: #fff;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            text-decoration: none; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            object-fit: contain;
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.18); 
            transform: translateY(-5px); 
            border-color: rgba(255, 255, 255, 0.5); 
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="blur"></div>
    <canvas id="snowCanvas"></canvas>

    <div class="content">
        <div class="container">
            <div class="profile-pic"></div>
            <h1>Arctic fox</h1>
            
            <a href="#" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=19318&format=png&color=ffffff" class="btn-icon"> YOUTUBE
            </a>
            
            <a href="#" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=30998&format=png&color=ffffff" class="btn-icon"> DISCORD
            </a>
            
            <a href="#" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=113032&format=png&color=ffffff" class="btn-icon"> STEAM
            </a>

            <a href="#" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=32309&format=png&color=ffffff" class="btn-icon"> INSTAGRAM
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor(x, y, isBg = false) {
                this.x = x; this.y = y; this.isBg = isBg;
                this.size = Math.random() * (isBg ? 2 : 5) + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = isBg ? Math.random() * 0.4 + 0.1 : 1;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.isBg) { if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; } }
                else { this.opacity -= 0.012; }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, true));
        window.addEventListener('mousemove', (e) => { for (let i = 0; i < 3; i++) particles.push(new Particle(e.clientX, e.clientY, false)); });
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (!particles[i].isBg && particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
