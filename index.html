<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcticfox home</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow-x: hidden; /* 隱藏左右捲軸 */
            overflow-y: auto;   /* 🌟 允許上下滑動 */
            color: white; font-family: sans-serif;
        }

        /* 🖼️ 背景圖層 */
        .bg {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* 🌫️ 模糊遮罩層 */
        .blur {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        
        /* 整個內容區塊的基本設定 (手機版預設為上下排版) */
        .content { 
            position: relative; 
            z-index: 10; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; /* 手機版：上下排版 */
            align-items: center; 
            padding: 40px 20px; 
            gap: 40px; 
            box-sizing: border-box;
            pointer-events: none; 
        }

        /* 👈 左邊面板 (按鈕區) */
        .left-panel { 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
            pointer-events: auto; 
        }

        /* 👉 右邊面板 (用來包住所有音樂、影片區塊) */
        .right-panel {
            width: 100%;
            max-width: 500px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 右邊的磨砂玻璃卡片樣式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 大頭貼設定 */
        .profile-pic { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            margin: 0 auto 15px; 
            border: 2px solid rgba(255,255,255,0.8); 
            background-image: url('28599.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        h1 { font-size: 2rem; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0px 4px 10px rgba(0,0,0,0.5); }

        /* 按鈕樣式 */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.3); 
            color: #fff;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            text-decoration: none; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            object-fit: contain;
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.25); 
            transform: translateY(-5px) scale(1.02); 
            border-color: rgba(255, 255, 255, 0.6); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 💻 🌟 電腦版專屬魔法 (螢幕大於 800px 時觸發) 🌟 */
        @media (min-width: 800px) {
            .content {
                flex-direction: row; /* 變成左右排版 */
                align-items: flex-start; /* 讓左右兩邊各自獨立高度 */
                justify-content: center;
                gap: 80px; /* 左右間距 */
                max-width: 1200px; 
                margin: 0 auto; 
                padding: 80px 20px;
            }

            .left-panel {
                position: sticky; /* 🌟 核心魔法：黏住！ */
                top: 80px; /* 距離頂端 80px */
            }

            .right-panel {
                flex: 1;
                max-width: 600px; /* 電腦版右邊面板可以寬一點 */
            }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="blur"></div>
    <canvas id="snowCanvas"></canvas>

    <div class="content">
        <div class="left-panel">
            <div class="profile-pic"></div>
            <h1>Arctic fox</h1>
            
            <a href="https://www.youtube.com/@arcticfox9477" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=19318&format=png&color=ffffff" class="btn-icon"> YOUTUBE
            </a>
            
            <a href="#" onclick="navigator.clipboard.writeText('這裡填你的Discord帳號'); alert('已複製 Discord 帳號！快去加我好友吧！\nDiscord copied! Add me!'); return false;" class="btn">
                <img src="https://img.icons8.com/?size=100&id=30998&format=png&color=ffffff" class="btn-icon"> DISCORD
            </a>
            
            <a href="https://steamcommunity.com/id/fox_tw" target="_blank" class="btn">
                <img src="steam.png" class="btn-icon"> STEAM
            </a>

            <a href="#" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=32309&format=png&color=ffffff" class="btn-icon"> INSTAGRAM
            </a>

            <div style="margin-top: 30px; display: flex; justify-content: center;">
                <div style="
                    display: inline-flex; 
                    align-items: center; 
                    background: rgba(255, 255, 255, 0.1); 
                    border: 1px solid rgba(255, 255, 255, 0.15); 
                    backdrop-filter: blur(10px); 
                    -webkit-backdrop-filter: blur(10px); 
                    border-radius: 20px; 
                    padding: 8px 18px; 
                    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                    transition: all 0.3s ease;
                " onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'">
                    
                    <img src="https://img.icons8.com/?size=100&id=115206&format=png&color=ffffff" style="width: 18px; height: 18px; margin-right: 8px; opacity: 0.9;">
                    <span style="font-size: 13px; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.9); margin-right: 8px;">VISITORS</span>
                    
                    <span id="busuanzi_value_site_uv" style="font-size: 15px; font-weight: bold; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.8);"></span>
                </div>
            </div>
        </div>

        <div class="right-panel">
            
            <div class="glass-card">
                <h2 style="font-size: 1.1rem; letter-spacing: 2px; margin: 0 0 15px 0;">🎵 NOW PLAYING</h2>
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <div class="glass-card">
                <h2 style="font-size: 1.1rem; letter-spacing: 2px; margin: 0 0 15px 0;">📺 FAVORITE VIDEO</h2>
                <iframe width="100%" height="250" style="border-radius: 12px;" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            
            <div class="glass-card">
                <h2 style="font-size: 1.1rem; letter-spacing: 2px; margin: 0 0 15px 0;">📝 ABOUT</h2>
                <p style="font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); margin: 0;">
                    陳漢傻逼
                </p>
                <br>
                <p style="font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); margin: 0;">向下捲動測試...</p>
                <br><br><br><br><br><br><br><br><br><br>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, isBg = false) {
                this.x = x; this.y = y; this.isBg = isBg;
                this.size = Math.random() * (isBg ? 2 : 5) + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = isBg ? Math.random() * 0.5 + 0.2 : 1;
            }
            
            update(timeScale = 1) {
                this.y += this.speedY * timeScale; 
                this.x += this.speedX * timeScale;
                
                if (this.isBg) { 
                    if (this.y > canvas.height) { 
                        this.y = -10; 
                        this.x = Math.random() * canvas.width; 
                    } 
                } else { 
                    this.opacity -= 0.015 * timeScale; 
                }
            }
            
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill();
            }
        }

        for (let i = 0; i < 200; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, true));
        }

        window.addEventListener('mousemove', (e) => { 
            for (let i = 0; i < 1; i++) {
                particles.push(new Particle(e.clientX, e.clientY, false)); 
            }
        });

        let lastTime = 0;

        function animate(currentTime) {
            if (!lastTime) lastTime = currentTime;
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            let timeScale = deltaTime / 16.66;
            if (timeScale > 5) timeScale = 1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(timeScale); 
                particles[i].draw();
                
                if (!particles[i].isBg && particles[i].opacity <= 0) { 
                    particles.splice(i, 1); 
                    i--; 
                }
            }
            requestAnimationFrame(animate);
        }
        
        requestAnimationFrame(animate);
    </script>
    
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
