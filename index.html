<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX | SNOW PORTAL</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            color: white; font-family: sans-serif;
        }

        /* 🖼️ 背景圖層：直接使用檔名 (最標準且最穩定的寫法) */
        .bg {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('bg.jpg'); /* 改成這樣！ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* 🌫️ 模糊遮罩層 */
        .blur {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .content { position: relative; z-index: 10; height: 100vh; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .container { width: 320px; text-align: center; pointer-events: auto; }

        /* 🖼️ 大頭貼設定：一樣直接寫檔名 */
        .profile-pic { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            margin: 0 auto 15px; 
            border: 2px solid rgba(255,255,255,0.8); 
            background-image: url('28599.jpg'); /* 改成這樣！ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        h1 { font-size: 2rem; letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0px 4px 10px rgba(0,0,0,0.5); }

        /* 按鈕樣式 */
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.3); 
            color: #fff;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 2px;
            text-decoration: none; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            object-fit: contain;
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.25); 
            transform: translateY(-5px) scale(1.02); 
            border-color: rgba(255, 255, 255, 0.6); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="blur"></div>
    <canvas id="snowCanvas"></canvas>

    <div class="content">
        <div class="container">
            <div class="profile-pic"></div>
            <h1>Arctic fox</h1>
            
            <a href="https://www.youtube.com/@arcticfox9477" target="_blank" class="btn">
            <img src="https://img.icons8.com/?size=100&id=19318&format=png&color=ffffff" class="btn-icon"> YOUTUBE
            </a>
            
            <a href="#" onclick="navigator.clipboard.writeText('這裡填你的Discord帳號'); alert('已複製 Discord 帳號！快去加我好友吧！\nDiscord copied! Add me!'); return false;" class="btn">
            <img src="https://img.icons8.com/?size=100&id=30998&format=png&color=ffffff" class="btn-icon"> DISCORD
            </a>
            
            <a href="https://steamcommunity.com/id/fox_tw" target="_blank" class="btn">
                <img src="steam.png" class="btn-icon"> STEAM
            </a>

            <a href="#" target="_blank" class="btn">
                <img src="https://img.icons8.com/?size=100&id=32309&format=png&color=ffffff" class="btn-icon"> INSTAGRAM
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, isBg = false) {
                this.x = x; this.y = y; this.isBg = isBg;
                this.size = Math.random() * (isBg ? 2 : 5) + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = isBg ? Math.random() * 0.5 + 0.2 : 1;
            }
            
            // 🌟 修正點 1：加入 timeScale 參數
            update(timeScale = 1) {
                // 移動距離乘上時間比例
                this.y += this.speedY * timeScale; 
                this.x += this.speedX * timeScale;
                
                if (this.isBg) { 
                    if (this.y > canvas.height) { 
                        this.y = -10; 
                        this.x = Math.random() * canvas.width; 
                    } 
                } else { 
                    // 滑鼠雪花的淡出速度也乘上時間比例
                    this.opacity -= 0.015 * timeScale; 
                }
            }
            
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill();
            }
        }

        // 保留你設定的 200 顆背景雪花
        for (let i = 0; i < 200; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, true));
        }

        // 保留你設定的滑鼠移動 1 顆雪花特效
        window.addEventListener('mousemove', (e) => { 
            for (let i = 0; i < 1; i++) {
                particles.push(new Particle(e.clientX, e.clientY, false)); 
            }
        });

        // 🌟 修正點 2：加入時間差 (Delta Time) 運算
        let lastTime = 0;

        function animate(currentTime) {
            // 第一次執行時，記錄當下時間
            if (!lastTime) lastTime = currentTime;
            
            // 計算距離上一幀過了多少毫秒
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // 以 60Hz 螢幕的 16.66 毫秒為「基準 1 倍速」
            let timeScale = deltaTime / 16.66;
            
            // 防護機制：避免切換分頁太久，切回來時雪花瞬間大暴走
            if (timeScale > 5) timeScale = 1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(timeScale); // 🌟 將時間比例傳給雪花
                particles[i].draw();
                
                if (!particles[i].isBg && particles[i].opacity <= 0) { 
                    particles.splice(i, 1); 
                    i--; 
                }
            }
            requestAnimationFrame(animate);
        }
        
        // 啟動動畫
        requestAnimationFrame(animate);
    </script>
</body>
</html>
